version: "1.0"

agent:
  type: claude-code          # claude-code | openrouter
  repair_iterations_max: 5   # failure-triggered retry budget in run loop
  phase_delay_seconds: 0     # delay between claude -p calls (increase if rate limited)
  phases:
    - plan_architecture
    - generate_hcl
    - self_review
  claude:
    command: /opt/homebrew/bin/claude  # absolute command used for claude-code transport
    phase_timeout_seconds: 300  # hard timeout per claude phase call
  openrouter:
    model: ""                # required when type=openrouter
    base_url: https://openrouter.ai/api/v1
    timeout_seconds: 60
    max_retries: 2

mockway:
  url: http://127.0.0.1:8080
  auto_reset: true

# fakegcp routes `cloud: gcp` scenarios. Optional — leave url empty if
# only running Scaleway scenarios. `make mocks-up` starts both mockway
# and fakegcp side-by-side at the URLs below.
fakegcp:
  url: http://127.0.0.1:8081
  auto_reset: true

# ministack is the active AWS backend (M64+). Single endpoint
# covers all 62 AWS services including the full S3 sub-resource
# surface (GetBucketPolicy, GetBucketTagging, GetBucketEncryption,
# etc.) — that's the upgrade over fakeaws+SeaweedFS which split
# S3 across two backends. Reset goes to /_ministack/reset, not
# /mock/reset; state derivation goes through the polyfill in
# internal/cli/ministack_state.go (M65).
ministack:
  url: http://127.0.0.1:4566
  auto_reset: true

# fakeaws — DEPRECATED in M64+, scheduled for removal in M67.
# Kept here so the runtime stays constructible and any local
# scenario still pointing at port 8082 keeps working. Once M66
# proves ministack carries every AWS scenario green, this block
# disappears and the cloudMockStateRouter drops the fakeaws path.
fakeaws:
  url: http://127.0.0.1:8082
  auto_reset: true

# s3 — DEPRECATED in M64+ alongside fakeaws. ministack covers the
# full bucket sub-resource surface natively, so SeaweedFS is no
# longer needed for terraform-provider-aws's Read flow. Block
# kept temporarily for the M64–M66 cutover window; removed in M67.
s3:
  url: http://127.0.0.1:9090
  auto_reset: true

scaleway:
  credentials_source: env    # env | config-file

validation:
  layers:
    static:
      enabled: true
      policy_paths: [./policies/common, ./policies/scaleway, ./policies/gcp, ./policies/aws]
    mock_deploy:
      enabled: true
    sandbox_deploy:
      enabled: false
    destruction:
      enabled: true
  real_probes:
    timeout_seconds: 5
    retries: 6
    retry_delay_seconds: 5

constraint_policies:
  no_public_database: scaleway/no_public_database.rego
  encryption_at_rest: scaleway/encryption_at_rest.rego
  no_public_endpoints: scaleway/no_public_endpoints.rego
  # region_restriction is the criterion `check:` value post-S51 (the
  # migration renamed from constraint-key `region` to policy-name
  # `region_restriction` to make the criterion self-documenting).
  # Keep the legacy `region` + `zone` keys for backwards compat with
  # any external scenario YAML still using the pre-S51 names.
  region_restriction: scaleway/region_restriction.rego
  region: scaleway/region_restriction.rego
  zone: scaleway/region_restriction.rego

paths:
  scenarios: ./scenarios
  mappings: ./mappings.yaml
  output: ./output
  policies: ./policies
  prompts: ./prompts
  pitfalls: ./pitfalls
