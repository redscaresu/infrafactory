version: "1.0"

agent:
  type: claude-code          # claude-code | openrouter
  repair_iterations_max: 5   # failure-triggered retry budget in run loop
  phase_delay_seconds: 0     # delay between claude -p calls (increase if rate limited)
  phases:
    - plan_architecture
    - generate_hcl
    - self_review
  claude:
    command: /opt/homebrew/bin/claude  # absolute command used for claude-code transport
    phase_timeout_seconds: 300  # hard timeout per claude phase call
  openrouter:
    model: ""                # required when type=openrouter
    base_url: https://openrouter.ai/api/v1
    timeout_seconds: 60
    max_retries: 2

mockway:
  url: http://127.0.0.1:8080
  auto_reset: true

# fakegcp routes `cloud: gcp` scenarios. Optional — leave url empty if
# only running Scaleway scenarios. `make mocks-up` starts both mockway
# and fakegcp side-by-side at the URLs below.
fakegcp:
  url: http://127.0.0.1:8081
  auto_reset: true

# fakeaws routes `cloud: aws` scenarios (everything except S3 — see
# s3mock below). Optional.
fakeaws:
  url: http://127.0.0.1:8082
  auto_reset: true

# s3 is the third-party S3 backend used in place of fakeaws's
# built-in S3 handler for AWS scenarios touching aws_s3_bucket /
# aws_s3_object / etc. Default backend is SeaweedFS (Apache 2.0,
# full S3 surface). Decision documented in CONCEPT.md "Third-Party
# Mock Integration" section (M59). Optional — if URL is empty, S3
# calls fall back to fakeaws (which serves a stripped-down S3 surface
# kept around for direct-HTTP tests, not viable for terraform-
# provider-aws Read flows).
s3:
  url: http://127.0.0.1:9090
  auto_reset: true

scaleway:
  credentials_source: env    # env | config-file

validation:
  layers:
    static:
      enabled: true
      policy_paths: [./policies/common, ./policies/scaleway, ./policies/gcp, ./policies/aws]
    mock_deploy:
      enabled: true
    sandbox_deploy:
      enabled: false
    destruction:
      enabled: true
  real_probes:
    timeout_seconds: 5
    retries: 6
    retry_delay_seconds: 5

constraint_policies:
  no_public_database: scaleway/no_public_database.rego
  encryption_at_rest: scaleway/encryption_at_rest.rego
  no_public_endpoints: scaleway/no_public_endpoints.rego
  # region_restriction is the criterion `check:` value post-S51 (the
  # migration renamed from constraint-key `region` to policy-name
  # `region_restriction` to make the criterion self-documenting).
  # Keep the legacy `region` + `zone` keys for backwards compat with
  # any external scenario YAML still using the pre-S51 names.
  region_restriction: scaleway/region_restriction.rego
  region: scaleway/region_restriction.rego
  zone: scaleway/region_restriction.rego

paths:
  scenarios: ./scenarios
  mappings: ./mappings.yaml
  output: ./output
  policies: ./policies
  prompts: ./prompts
  pitfalls: ./pitfalls
