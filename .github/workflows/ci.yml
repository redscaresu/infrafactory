name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI (embedded via go:embed)
        # cmd/infrafactory/embed.go requires `cmd/infrafactory/ui/build/` to
        # exist at compile time. Both are gitignored, so CI must produce
        # them before any `go test`/`go build` of cmd/infrafactory runs.
        run: |
          cd ui && npm ci && npm run build
          cd ..
          rm -rf cmd/infrafactory/ui/build
          mkdir -p cmd/infrafactory/ui
          cp -R ui/build cmd/infrafactory/ui/

      - name: Run tests
        # -count=2 surfaces parallel-subtest races that would otherwise
        # flake only in CI (e.g. the May 2026 regression where
        # TestCommandOutputGoldenSnapshots/run_json passed locally on
        # macOS but failed on the Linux runner because two parallel
        # subtests collided on the relative-path `./output` default).
        run: go test -count=2 ./...

  build-binary:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI (embedded via go:embed)
        run: |
          cd ui && npm ci && npm run build
          cd ..
          rm -rf cmd/infrafactory/ui/build
          mkdir -p cmd/infrafactory/ui
          cp -R ui/build cmd/infrafactory/ui/

      - name: Build binary
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=${{ matrix.arch }} CGO_ENABLED=0 go build -trimpath -o dist/infrafactory-linux-${{ matrix.arch }} ./cmd/infrafactory

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: infrafactory-linux-${{ matrix.arch }}
          path: dist/infrafactory-linux-${{ matrix.arch }}
