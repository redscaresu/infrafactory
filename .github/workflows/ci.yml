name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

env:
  # M80 — opt into Node 24 ahead of GitHub's forced June 2 2026 flip
  # so any breakage in our Playwright + npm-install path surfaces on
  # our schedule rather than at 00:00 UTC. Set at workflow scope so
  # every job (test, gitleaks, build-binary) gets it uniformly.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # M78 — share provider downloads across runs (~200MB saved per
      # CI run; mirrors mockway's CI pattern).
      TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Prepare Terraform plugin cache directory
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Cache Terraform providers
        uses: actions/cache@v5
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-plugin-cache-${{ runner.os }}-v1

      - name: Build UI (embedded via go:embed)
        # cmd/infrafactory/embed.go requires `cmd/infrafactory/ui/build/` to
        # exist at compile time. Both are gitignored, so CI must produce
        # them before any `go test`/`go build` of cmd/infrafactory runs.
        run: |
          cd ui && npm ci && npm run build
          cd ..
          rm -rf cmd/infrafactory/ui/build
          mkdir -p cmd/infrafactory/ui
          cp -R ui/build cmd/infrafactory/ui/

      - name: Run tests
        # M71: -race detects genuine Go data races (the 3 fakes all
        # run with -race; infrafactory was the only repo without it
        # despite being the most concurrency-heavy).
        # -count=2 surfaces parallel-subtest filesystem races that
        # would otherwise flake only in CI (e.g. the May 2026
        # regression where TestCommandOutputGoldenSnapshots/run_json
        # passed locally on macOS but failed on Linux because two
        # parallel subtests collided on the relative-path `./output`
        # default).
        run: go test -race -count=2 ./...

  gitleaks:
    # M72: mirror the local pre-commit hook + the 3 sibling-fake CI
    # jobs. The pre-commit hook is bypassable with --no-verify and
    # does not run on fork PRs, so this job is the load-bearing
    # secret scan for OSS-fork contributions.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          curl -sSfL -o /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --redact --no-banner --source=. --config .gitleaks.toml

  build-binary:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build UI (embedded via go:embed)
        run: |
          cd ui && npm ci && npm run build
          cd ..
          rm -rf cmd/infrafactory/ui/build
          mkdir -p cmd/infrafactory/ui
          cp -R ui/build cmd/infrafactory/ui/

      - name: Build binary
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=${{ matrix.arch }} CGO_ENABLED=0 go build -trimpath -o dist/infrafactory-linux-${{ matrix.arch }} ./cmd/infrafactory

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: infrafactory-linux-${{ matrix.arch }}
          path: dist/infrafactory-linux-${{ matrix.arch }}
