scenario: genesys-basic-queue
version: "1.0"
cloud: genesys
description: >
  A single Genesys routing queue with a skill, a wrap-up code, and one
  member. Exercises fakegenesys's identity (user, auth_role) + routing
  (queue, skill, wrapupcode) handlers end-to-end through infrafactory's
  Layer 2 mock-deploy harness.

genesys_resource_anchors:
  - genesyscloud_user
  - genesyscloud_routing_queue
  - genesyscloud_routing_skill
  - genesyscloud_routing_wrapupcode

resources:
  routing:
    purpose: contact-routing
    queue_count: 1
    skills: ["english"]
    wrapup_codes: ["resolved"]

acceptance_criteria:
  - criterion: region_restriction
    layer: static
    package: genesys.region_restriction
    params:
      region_allowlist: ["us-east-1"]
  - criterion: queue_must_have_wrapup
    layer: static
    package: genesys.queue_must_have_wrapup
  - criterion: topology_assertion
    layer: mock_deploy
    expect:
      connectivity_keys:
        - "routing_queue:*"
