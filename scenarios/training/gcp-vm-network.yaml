scenario: gcp-vm-network
version: "1.0"
cloud: gcp
description: >
  A simple GCP VM in europe-west1 attached to a custom VPC and subnet,
  with a firewall rule allowing only SSH from a developer CIDR. Exercises
  the VPC + subnetwork + instance + firewall flow.

resources:
  compute:
    purpose: web-server
    size: small
  networking:
    vpc: true
    private_network: true

acceptance_criteria:
  - type: policy
    check: region_restriction
    params:
      region: europe-west1
    expect: pass
  - type: destruction
    expect: no_orphans
