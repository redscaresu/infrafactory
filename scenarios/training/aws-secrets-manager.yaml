scenario: aws-secrets-manager
version: "1.0"
cloud: aws
description: >
  A Secrets Manager secret bundle with an initial version. Exercises
  the Active → PendingDeletion → Destroyed state machine and the
  AWSCURRENT/AWSPREVIOUS stage labels.

aws_resource_anchors:
  - aws_secretsmanager_secret
  - aws_secretsmanager_secret_version

resources:
  secret_manager:
    purpose: db-credentials
    version: true

acceptance_criteria:
  - type: policy
    check: region_restriction
    params:
      region: us-east-1
    expect: pass
  - type: destruction
    expect: no_orphans
