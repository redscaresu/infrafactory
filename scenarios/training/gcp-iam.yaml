scenario: gcp-iam
version: "1.0"
cloud: gcp
description: >
  A service account with a service-account key. Exercises fakegcp's
  IAM handlers (handlers/iam.go) end-to-end through infrafactory's
  Layer-2 mock-deploy harness.

resources:
  iam:
    purpose: ci-cd
    application: true
    api_key: true

acceptance_criteria:
  - type: policy
    check: region_restriction
    params:
      region: us-central1
    expect: pass
  - type: destruction
    expect: no_orphans
