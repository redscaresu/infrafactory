scenario: redis-paris
version: "1.0"
cloud: scaleway
description: >
  A managed Redis cluster in Paris for application caching,
  deployed on a private network within a VPC.

resources:
  redis:
    purpose: cache
    size: small
  networking:
    vpc: true
    private_network: true

acceptance_criteria:
  - type: policy
    check: region_restriction
    params:
      region: fr-par
    expect: pass
  - type: destruction
    expect: no_orphans
