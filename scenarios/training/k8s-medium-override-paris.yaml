scenario: k8s-medium-override-paris
version: "1.0"
cloud: scaleway
description: >
  A medium-sized Kubernetes cluster in Paris with explicit
  overrides for node type and node count, deployed on a
  private network within a VPC. Exercises medium K8s size
  and override parameters not covered by other training
  scenarios.

resources:
  kubernetes:
    size: medium
    override:
      node_type: DEV1-M
      node_count: 3
  networking:
    vpc: true
    private_network: true

acceptance_criteria:
  - type: policy
    check: region_restriction
    params:
      region: fr-par
    expect: pass
  - type: destruction
    expect: no_orphans
