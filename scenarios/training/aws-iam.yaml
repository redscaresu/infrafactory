scenario: aws-iam
version: "1.0"
cloud: aws
description: >
  An IAM role + policy + attachment. Exercises fakeaws's IAM Query-RPC
  handlers (handlers/iam.go) end-to-end through infrafactory's Layer-2
  mock-deploy harness. The aws_resource_anchors list pins the specific
  per-API resource types this scenario asserts coverage for, so
  S48-T7's TestFullCoverageAudit can credit them.

aws_resource_anchors:
  - aws_iam_role
  - aws_iam_policy
  - aws_iam_role_policy_attachment

resources:
  iam:
    purpose: app-permissions
    application: true
    api_key: false

constraints:
  region: us-east-1

acceptance_criteria:
  - type: destruction
    expect: no_orphans
