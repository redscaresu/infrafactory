scenario: genesys-rbac-and-oauth
version: "1.0"
cloud: genesys
description: >
  An RBAC + OAuth integration: an auth_role, a user with that role, an
  oauth_client for service-to-service auth, and a group. Exercises
  fakegenesys's identity surface end-to-end, including the
  oauth_client reveal-once secret semantics.

genesys_resource_anchors:
  - genesyscloud_auth_role
  - genesyscloud_user
  - genesyscloud_group
  - genesyscloud_oauth_client

resources:
  identity:
    purpose: rbac-and-bot-auth

acceptance_criteria:
  - type: policy
    check: region_restriction
    params:
      region_allowlist: ["us-east-1"]
    expect: pass
  - type: policy
    check: oauth_client_least_privilege
    expect: pass
