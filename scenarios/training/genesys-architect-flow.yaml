scenario: genesys-architect-flow
version: "1.0"
cloud: genesys
description: >
  An architect flow with a user prompt and a datatable lookup. Exercises
  fakegenesys's architect surface — flow multipart upload, prompt
  reference, datatable + rows CRUD.

genesys_resource_anchors:
  - genesyscloud_flow
  - genesyscloud_architect_user_prompt
  - genesyscloud_architect_datatable

resources:
  architect:
    purpose: ivr-with-lookup

acceptance_criteria:
  - type: policy
    check: region_restriction
    params:
      region_allowlist: ["us-east-1"]
    expect: pass
