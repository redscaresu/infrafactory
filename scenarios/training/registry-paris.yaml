scenario: registry-paris
version: "1.0"
cloud: scaleway
description: >
  A private container registry namespace in Paris for storing
  application Docker images.

resources:
  registry:
    purpose: app-images
    is_public: false

acceptance_criteria:
  - type: policy
    check: region_restriction
    params:
      region: fr-par
    expect: pass
  - type: destruction
    expect: no_orphans
