scenario: gcp-pubsub
version: "1.0"
cloud: gcp
description: >
  A Pub/Sub topic with a default pull subscription, exercising
  fakegcp's topic → subscription FK chain end-to-end through
  infrafactory's Layer-2 mock-deploy harness.

resources:
  pubsub:
    purpose: events
    subscription: true

acceptance_criteria:
  - type: policy
    check: region_restriction
    params:
      region: us-central1
    expect: pass
  - type: destruction
    expect: no_orphans
