scenario: redis-xlarge-session-paris
version: "1.0"
cloud: scaleway
description: >
  An xlarge Redis cluster for session storage in Paris, with
  an xlarge compute instance connected via a private network
  within a VPC. Uses prescriptive Redis node_type override.
  Exercises xlarge Redis size, Redis override, xlarge compute,
  and session-store purpose — parameter combinations not
  covered by other training scenarios.

resources:
  compute:
    purpose: app-server
    size: xlarge
    count: 1
  networking:
    vpc: true
    private_network: true
  redis:
    purpose: session-store
    size: xlarge
    override:
      node_type: RED1-L

acceptance_criteria:
  - type: policy
    check: region_restriction
    params:
      region: fr-par
    expect: pass
  - type: connectivity
    from: compute
    to: redis
    port: 6379
    expect: success
    description: "App server must reach the Redis cluster via private network"
  - type: destruction
    expect: no_orphans
