scenario: gcp-secret-manager
version: "1.0"
cloud: gcp
description: >
  A Secret Manager secret with one initial version. Exercises
  fakegcp's secret → version FK chain (TestSecretDeleteWithVersions)
  end-to-end through infrafactory's Layer-2 mock-deploy harness.

resources:
  secret_manager:
    purpose: db-credentials
    version: true

constraints:
  region: us-central1

acceptance_criteria:
  - type: destruction
    expect: no_orphans
