scenario: genesys-multi-queue-skills
version: "1.0"
cloud: genesys
description: >
  Three queues sharing two skills and three wrap-up codes. Exercises
  shared-reference FKs (multiple queues referencing the same skill ids)
  and the fakegenesys routing surface at depth.

genesys_resource_anchors:
  - genesyscloud_routing_queue
  - genesyscloud_routing_skill
  - genesyscloud_routing_wrapupcode
  - genesyscloud_routing_language

resources:
  routing:
    purpose: tiered-contact-routing
    queue_count: 3
    skills: ["english", "french"]
    wrapup_codes: ["resolved", "callback", "escalated"]
    languages: ["en-US", "fr-FR"]

acceptance_criteria:
  - criterion: region_restriction
    layer: static
    package: genesys.region_restriction
    params:
      region_allowlist: ["us-east-1", "eu-west-1"]
  - criterion: queue_must_have_wrapup
    layer: static
    package: genesys.queue_must_have_wrapup
