scenario: iam-policies-paris
version: "1.0"
cloud: scaleway
description: >
  IAM setup for a service account in Paris: an IAM application
  with a scoped API key and a policy granting project-level
  permissions.

resources:
  iam:
    purpose: service-account
    application: true
    api_key: true
    policy: true

acceptance_criteria:
  - type: policy
    check: region_restriction
    params:
      region: fr-par
    expect: pass
  - type: destruction
    expect: no_orphans
