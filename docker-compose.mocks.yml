# docker-compose.mocks.yml — multi-mock orchestration. Use via
# `make mocks-up-containers` (this file is NOT the default
# docker-compose.yml — that one's reserved for the UI/dev stack).
#
# M64+ topology: ministack is the active AWS backend; fakeaws + the
# SeaweedFS S3 gateway are kept for the M64–M66 cutover window and
# removed in M67. Active services after M67: mockway (Scaleway),
# fakegcp (GCP), ministack (AWS).
#
# Sibling-repo builds for the 1st-party mocks (mockway, fakegcp).
# ministack pulls from Docker Hub since it's not a sibling repo.
#
# All ports bind to 127.0.0.1 by default; override `MOCKS_BIND=0.0.0.0`
# to expose them.
#
# Port allocation:
#   mockway   → 8080   (Scaleway scenarios)
#   fakegcp   → 8081   (GCP scenarios)
#   ministack → 4566   (AWS scenarios; M64+, LocalStack convention)
#   fakeaws   → 8082   (deprecated; removed in M67)
#   s3        → 9090   (deprecated; ministack S3 covers it; removed in M67)

services:
  mockway:
    image: ${MOCKWAY_IMAGE:-infrafactory-mockway:local}
    build:
      context: ../mockway
    container_name: infrafactory-mockway
    restart: unless-stopped
    ports:
      - "${MOCKS_BIND:-127.0.0.1}:8080:8080"
    command: ["--port", "8080"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/mock/state"]
      interval: 5s
      timeout: 2s
      retries: 6

  fakegcp:
    image: ${FAKEGCP_IMAGE:-infrafactory-fakegcp:local}
    build:
      context: ../fakegcp
    container_name: infrafactory-fakegcp
    restart: unless-stopped
    ports:
      - "${MOCKS_BIND:-127.0.0.1}:8081:8080"
    command: ["--port", "8080"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/mock/state"]
      interval: 5s
      timeout: 2s
      retries: 6

  # ministack — the active AWS backend (M64+). Covers 62 AWS
  # services including the full S3 sub-resource surface, so it
  # replaces both fakeaws AND the SeaweedFS S3 gateway. Pulled from
  # Docker Hub (not a sibling repo). Healthcheck hits the
  # /_ministack/health endpoint which returns a JSON service map.
  ministack:
    image: ${MINISTACK_IMAGE:-ministackorg/ministack:latest}
    container_name: infrafactory-ministack
    restart: unless-stopped
    ports:
      - "${MOCKS_BIND:-127.0.0.1}:4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4566/_ministack/health | grep -q '\"version\"'"]
      interval: 5s
      timeout: 2s
      retries: 6

  # fakeaws — DEPRECATED (M64+). Kept until M67 closeout so the
  # transition window doesn't break for anyone running the
  # pre-migration Makefile / config. Removed from the default
  # `mocks-up-containers` profile via the `legacy` profile gate.
  fakeaws:
    image: ${FAKEAWS_IMAGE:-infrafactory-fakeaws:local}
    build:
      context: ../fakeaws
    container_name: infrafactory-fakeaws
    restart: unless-stopped
    profiles: ["legacy"]
    ports:
      - "${MOCKS_BIND:-127.0.0.1}:8082:8082"
    command: ["--port", "8082"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/mock/state"]
      interval: 5s
      timeout: 2s
      retries: 6

  # SeaweedFS S3 gateway — DEPRECATED (M64+). ministack's S3 surface
  # covers everything the fakeaws+SeaweedFS split previously did
  # (GetBucketPolicy / GetBucketTagging / GetBucketEncryption / etc.
  # all probed correctly in the M64-T4 spike). Kept here under the
  # `legacy` profile so the transition window doesn't break; removed
  # in M67. Decision rationale: docs/plans/ministack-spike.md.
  s3:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:latest}
    container_name: infrafactory-s3
    restart: unless-stopped
    profiles: ["legacy"]
    ports:
      - "${MOCKS_BIND:-127.0.0.1}:9090:8333"
    command: ["server", "-s3", "-s3.port=8333", "-s3.allowEmptyFolder=true"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8333/ | grep -q ListAllMyBucketsResult"]
      interval: 5s
      timeout: 2s
      retries: 6
