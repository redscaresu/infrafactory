provider: aws
pitfalls:
    - resource: aws_security_group_rule
      rule: 'For security groups that reference themselves (e.g., "allow all traffic within this SG"), use separate `aws_security_group_rule` resources INSTEAD OF inline `ingress`/`egress` blocks on `aws_security_group`. Inline blocks that self-reference create a circular dependency the provider cannot resolve and `tofu apply` fails with a "Cycle: aws_security_group" error.'
      source: seed
    - resource: aws_db_instance
      rule: 'Any `aws_db_instance` placed in a custom VPC requires an `aws_db_subnet_group` listing â‰Ą2 subnets in different AZs. Without one, the instance create fails with "DBSubnetGroupNotFound". The subnet group must be passed via `db_subnet_group_name`, NOT `subnet_ids` directly on the instance.'
      source: seed
    - resource: aws_db_instance
      rule: 'For non-production / test scenarios, set `deletion_protection = false` AND `skip_final_snapshot = true` so `tofu destroy` can tear the instance down. Both default to `true`/`false` respectively, which makes destroys fail with "cannot delete instance: deletion protection enabled" or "final snapshot must be specified".'
      source: seed
    - resource: aws_iam_instance_profile
      rule: '`aws_instance` cannot reference an `aws_iam_role` directly â€” the bridge between role and instance is `aws_iam_instance_profile`. Create the profile with `role = aws_iam_role.NAME.name`, then reference it via `iam_instance_profile = aws_iam_instance_profile.NAME.name` on the instance. Skipping the profile produces "InvalidParameterValue: IAM role cannot be associated with EC2 instance directly".'
      source: seed
    - resource: aws_s3_bucket
      rule: 'S3 bucket names are GLOBALLY unique across all AWS accounts. Always include the account ID, region, or a random suffix in the bucket name (e.g. `"${var.run_id}-data"`). Set `force_destroy = true` for test scenarios so `tofu destroy` can remove non-empty buckets. The provider default is `false`, which makes destroy fail with "BucketNotEmpty".'
      source: seed
    - resource: aws_eks_cluster
      rule: 'EKS clusters require an `aws_iam_role` with the `AmazonEKSClusterPolicy` and `AmazonEKSServicePolicy` managed policies attached, AND a trust policy with `Service: eks.amazonaws.com`. Cluster create fails with "InvalidParameterException: role does not have necessary trust relationship" if the trust policy is missing.'
      source: seed
    - resource: aws_eks_cluster
      rule: 'EKS cluster `vpc_config.subnet_ids` MUST list â‰Ą2 subnets in different Availability Zones, all with IPv4 CIDR blocks. Single-AZ subnets or IPv6-only subnets cause "InvalidParameterException: subnets must be in at least two different AZs".'
      source: seed
    - resource: aws_eks_node_group
      rule: 'NodeGroups depend on the cluster being ACTIVE â€” set `depends_on = [aws_eks_cluster.NAME]` explicitly so the create order is correct. Node-group IAM role needs `AmazonEKSWorkerNodePolicy`, `AmazonEKS_CNI_Policy`, and `AmazonEC2ContainerRegistryReadOnly` attached.'
      source: seed
    - resource: aws_route53_record
      rule: 'Use `aws_route53_record` with `set_identifier` only when implementing weighted/latency/failover routing. For simple A/AAAA records, omit set_identifier â€” its presence forces multi-record routing semantics and a single record will fail to apply with "RRSet must be unique".'
      source: seed
    - resource: aws_secretsmanager_secret
      rule: 'For test/destroy cycles, set `recovery_window_in_days = 0` so the secret is deleted immediately on `tofu destroy`. The provider default is 30 days (the AWS soft-delete window), and a re-apply with the same secret name within 30 days fails with "InvalidRequestException: secret scheduled for deletion".'
      source: seed

    # ----- S44-T0 â€” EC2 phase pitfalls. -----

    - resource: aws_security_group
      rule: 'Inline `ingress`/`egress` blocks on `aws_security_group` and separate `aws_security_group_rule` resources are MUTUALLY EXCLUSIVE. Mixing them on the same SG ID makes the provider drift detection oscillate (each plan tries to revert the rules added by the other path), and `tofu apply` repeatedly converges then diverges. Pick one style per SG and stick to it â€” inline for simple flat rules, separate `aws_security_group_rule` resources whenever the SG references itself or another SG.'
      source: seed
    - resource: aws_route_table
      rule: '`aws_route_table_association` is the resource that binds a route table to a subnet â€” NOT a `subnet_id` argument on `aws_route_table` itself. Adding `subnet_id` to the route table fails with "Unsupported argument". Each subnet may have at most one route-table association; binding the same subnet to two route tables fails with "Resource.AlreadyAssociated".'
      source: seed
    - resource: aws_subnet
      rule: 'EC2 subnets are AZ-scoped â€” `availability_zone` must be a real zone within the `region` declared on the provider. Format is `<region><letter>` (e.g., `us-east-1a`); using just the region (`us-east-1`) or a non-existent zone (`us-east-1f` in regions that only have aâ€“c) fails with `InvalidParameterValue: invalid availability zone`. Subnets in different VPCs cannot be in the same AZ chain â€” each VPC has its own subnet-per-AZ tree.'
      source: seed
    - resource: aws_internet_gateway
      rule: 'The Internet Gateway resource (`aws_internet_gateway`) creates the IGW; the attachment to a VPC happens via the SAME resource''s `vpc_id` argument. There is NO separate `aws_internet_gateway_attachment` (despite Azure/GCP analogues). Setting `vpc_id` is required at create time â€” detaching later means setting `vpc_id = null` (provider quirk: this triggers a destroy + recreate). For multi-VPC setups, create one IGW per VPC.'
      source: seed
    - resource: aws_eip
      rule: 'Elastic IPs in a VPC require `domain = "vpc"` (the EC2-Classic default `"standard"` is rejected on accounts created after 2022). Associate via `aws_eip_association` to a network-interface OR `aws_eip.<name>.allocation_id` on the instance''s `network_interface { associate_public_ip = false ... }` block. Direct `instance` argument on `aws_eip` is deprecated and fails on subnet-launched instances.'
      source: seed
    - resource: aws_instance
      rule: 'EC2 instances launched into a custom VPC subnet must specify BOTH `subnet_id` AND `vpc_security_group_ids` (NOT `security_groups` â€” that argument is for EC2-Classic). Using `security_groups` in a VPC fails with "InvalidParameterValue: vpc security_groups not supported in this context". `vpc_security_group_ids` takes a list even when there''s only one SG.'
      source: seed
    - resource: aws_instance
      rule: 'AMI lookup data sources (`data.aws_ami`) are NOT supported by fakeaws at v1 â€” use a literal AMI id from the size-mappings table (e.g., `ami-0abcd1234`) instead of a `data.aws_ami` block. `data` sources fail at provider-init against the mock with "AccessDenied: data sources not implemented".'
      source: seed
    - resource: aws_route
      rule: 'A route''s destination_cidr_block must be unique within its route table. Multiple `aws_route` resources sharing the same route_table_id + destination_cidr_block fail at apply with "RouteAlreadyExists". For IPv6, use `destination_ipv6_cidr_block`; mixing it with v4 on the same resource is allowed.'
      source: seed
