provider: aws
pitfalls:
    - resource: aws_security_group_rule
      rule: 'For security groups that reference themselves (e.g., "allow all traffic within this SG"), use separate `aws_security_group_rule` resources INSTEAD OF inline `ingress`/`egress` blocks on `aws_security_group`. Inline blocks that self-reference create a circular dependency the provider cannot resolve and `tofu apply` fails with a "Cycle: aws_security_group" error.'
      source: seed
    - resource: aws_db_instance
      rule: 'Any `aws_db_instance` placed in a custom VPC requires an `aws_db_subnet_group` listing ≥2 subnets in different AZs. Without one, the instance create fails with "DBSubnetGroupNotFound". The subnet group must be passed via `db_subnet_group_name`, NOT `subnet_ids` directly on the instance.'
      source: seed
    - resource: aws_db_instance
      rule: 'For non-production / test scenarios, set `deletion_protection = false` AND `skip_final_snapshot = true` so `tofu destroy` can tear the instance down. Both default to `true`/`false` respectively, which makes destroys fail with "cannot delete instance: deletion protection enabled" or "final snapshot must be specified".'
      source: seed
    - resource: aws_iam_instance_profile
      rule: '`aws_instance` cannot reference an `aws_iam_role` directly — the bridge between role and instance is `aws_iam_instance_profile`. Create the profile with `role = aws_iam_role.NAME.name`, then reference it via `iam_instance_profile = aws_iam_instance_profile.NAME.name` on the instance. Skipping the profile produces "InvalidParameterValue: IAM role cannot be associated with EC2 instance directly".'
      source: seed
    - resource: aws_s3_bucket
      rule: 'S3 bucket names are GLOBALLY unique across all AWS accounts. Always include the account ID, region, or a random suffix in the bucket name (e.g. `"${var.run_id}-data"`). Set `force_destroy = true` for test scenarios so `tofu destroy` can remove non-empty buckets. The provider default is `false`, which makes destroy fail with "BucketNotEmpty".'
      source: seed
    - resource: aws_eks_cluster
      rule: 'EKS clusters require an `aws_iam_role` with the `AmazonEKSClusterPolicy` and `AmazonEKSServicePolicy` managed policies attached, AND a trust policy with `Service: eks.amazonaws.com`. Cluster create fails with "InvalidParameterException: role does not have necessary trust relationship" if the trust policy is missing.'
      source: seed
    - resource: aws_eks_cluster
      rule: 'EKS cluster `vpc_config.subnet_ids` MUST list ≥2 subnets in different Availability Zones, all with IPv4 CIDR blocks. Single-AZ subnets or IPv6-only subnets cause "InvalidParameterException: subnets must be in at least two different AZs".'
      source: seed
    - resource: aws_eks_node_group
      rule: 'NodeGroups depend on the cluster being ACTIVE — set `depends_on = [aws_eks_cluster.NAME]` explicitly so the create order is correct. Node-group IAM role needs `AmazonEKSWorkerNodePolicy`, `AmazonEKS_CNI_Policy`, and `AmazonEC2ContainerRegistryReadOnly` attached.'
      source: seed
    - resource: aws_route53_record
      rule: 'Use `aws_route53_record` with `set_identifier` only when implementing weighted/latency/failover routing. For simple A/AAAA records, omit set_identifier — its presence forces multi-record routing semantics and a single record will fail to apply with "RRSet must be unique".'
      source: seed
    - resource: aws_secretsmanager_secret
      rule: 'For test/destroy cycles, set `recovery_window_in_days = 0` so the secret is deleted immediately on `tofu destroy`. The provider default is 30 days (the AWS soft-delete window), and a re-apply with the same secret name within 30 days fails with "InvalidRequestException: secret scheduled for deletion".'
      source: seed

    # ----- S44-T0 — EC2 phase pitfalls. -----

    - resource: aws_security_group
      rule: 'Inline `ingress`/`egress` blocks on `aws_security_group` and separate `aws_security_group_rule` resources are MUTUALLY EXCLUSIVE. Mixing them on the same SG ID makes the provider drift detection oscillate (each plan tries to revert the rules added by the other path), and `tofu apply` repeatedly converges then diverges. Pick one style per SG and stick to it — inline for simple flat rules, separate `aws_security_group_rule` resources whenever the SG references itself or another SG.'
      source: seed
    - resource: aws_route_table
      rule: '`aws_route_table_association` is the resource that binds a route table to a subnet — NOT a `subnet_id` argument on `aws_route_table` itself. Adding `subnet_id` to the route table fails with "Unsupported argument". Each subnet may have at most one route-table association; binding the same subnet to two route tables fails with "Resource.AlreadyAssociated".'
      source: seed
    - resource: aws_subnet
      rule: 'EC2 subnets are AZ-scoped — `availability_zone` must be a real zone within the `region` declared on the provider. Format is `<region><letter>` (e.g., `us-east-1a`); using just the region (`us-east-1`) or a non-existent zone (`us-east-1f` in regions that only have a–c) fails with `InvalidParameterValue: invalid availability zone`. Subnets in different VPCs cannot be in the same AZ chain — each VPC has its own subnet-per-AZ tree.'
      source: seed
    - resource: aws_internet_gateway
      rule: 'The Internet Gateway resource (`aws_internet_gateway`) creates the IGW; the attachment to a VPC happens via the SAME resource''s `vpc_id` argument. There is NO separate `aws_internet_gateway_attachment` (despite Azure/GCP analogues). Setting `vpc_id` is required at create time — detaching later means setting `vpc_id = null` (provider quirk: this triggers a destroy + recreate). For multi-VPC setups, create one IGW per VPC.'
      source: seed
    - resource: aws_eip
      rule: 'Elastic IPs in a VPC require `domain = "vpc"` (the EC2-Classic default `"standard"` is rejected on accounts created after 2022). Associate via `aws_eip_association` to a network-interface OR `aws_eip.<name>.allocation_id` on the instance''s `network_interface { associate_public_ip = false ... }` block. Direct `instance` argument on `aws_eip` is deprecated and fails on subnet-launched instances.'
      source: seed
    - resource: aws_instance
      rule: 'EC2 instances launched into a custom VPC subnet must specify BOTH `subnet_id` AND `vpc_security_group_ids` (NOT `security_groups` — that argument is for EC2-Classic). Using `security_groups` in a VPC fails with "InvalidParameterValue: vpc security_groups not supported in this context". `vpc_security_group_ids` takes a list even when there''s only one SG.'
      source: seed
    - resource: aws_instance
      rule: 'AMI lookup data sources (`data.aws_ami`) are NOT supported by fakeaws at v1 — use a literal AMI id from the size-mappings table (e.g., `ami-0abcd1234`) instead of a `data.aws_ami` block. `data` sources fail at provider-init against the mock with "AccessDenied: data sources not implemented".'
      source: seed
    - resource: aws_route
      rule: 'A route''s destination_cidr_block must be unique within its route table. Multiple `aws_route` resources sharing the same route_table_id + destination_cidr_block fail at apply with "RouteAlreadyExists". For IPv6, use `destination_ipv6_cidr_block`; mixing it with v4 on the same resource is allowed.'
      source: seed

    # ----- S45-T0 — RDS + DynamoDB phase pitfalls. -----

    - resource: aws_db_subnet_group
      rule: 'A DB subnet group is REQUIRED before any `aws_db_instance` (or `aws_rds_cluster`) can land in a custom VPC; the subnet IDs MUST come from the SAME VPC (mixing VPCs fails with "InvalidParameterCombination: subnets must be in the same VPC"). At least 2 subnets in different AZs are required per the deployment-spread contract. Reference via `db_subnet_group_name = aws_db_subnet_group.NAME.name`, never inline subnet ids on the instance.'
      source: seed
    - resource: aws_db_parameter_group
      rule: 'DB parameter groups attach to instances via `parameter_group_name` AND must specify `family` matching the engine version (e.g., `family = "postgres15"` for PostgreSQL 15). Mismatched family/engine pairs fail with "DBParameterGroupFamilyMismatch". Cluster parameter groups (`aws_rds_cluster_parameter_group`) attach to clusters separately — they are NOT interchangeable with instance parameter groups.'
      source: seed
    - resource: aws_db_instance
      rule: 'For Aurora-style read replicas (`replicate_source_db`), the source must be in the same region (cross-region replication uses a different shape: `replicate_source_db` with full ARN). The replica inherits the source''s engine and engine_version automatically — setting them explicitly on the replica fails with "InvalidParameterCombination: cannot specify engine on a replica". Replica delete leaves the source intact; deleting the source while replicas exist fails with "DBInstanceAlreadyExists" until replicas are promoted or deleted first.'
      source: seed
    - resource: aws_dynamodb_table
      rule: 'DynamoDB table primary key is defined by `hash_key` (PK) and optional `range_key` (SK). Each must be listed in `attribute` blocks with `type = "S"|"N"|"B"`. Listing an `attribute` that''s NOT used by the table key OR a GSI/LSI fails the apply with "ValidationException: only attributes referenced in keys can be defined". v1 fakeaws does NOT support GSI/LSI — `global_secondary_index` and `local_secondary_index` blocks are silently ignored.'
      source: seed
    - resource: aws_dynamodb_table
      rule: 'Each `attribute.name` in a DynamoDB table must be UNIQUE — duplicate attribute names within the same table fail with "ValidationException: attribute name appears more than once". `billing_mode = "PAY_PER_REQUEST"` (on-demand) does NOT take `read_capacity`/`write_capacity` arguments; setting them with on-demand fails with "InvalidParameterCombination". For the v1 fakeaws fixture set, `billing_mode = "PAY_PER_REQUEST"` is the recommended path.'
      source: seed

    # ----- S46-T0 — EKS + SQS phase pitfalls. -----

    - resource: aws_eks_cluster
      rule: 'EKS cluster create rejects when the role lacks the `eks.amazonaws.com` Service principal in its `assume_role_policy`. The IAM role MUST have `Action: "sts:AssumeRole"` AND `Principal: { Service: "eks.amazonaws.com" }` AND the AmazonEKSClusterPolicy / AmazonEKSServicePolicy managed policies attached. Without the trust relationship, cluster create fails with "InvalidParameterException: role does not have necessary trust relationship". For nodegroups, the trust principal is `Service: "ec2.amazonaws.com"` (NOT eks.amazonaws.com) — different IAM role.'
      source: seed
    - resource: aws_eks_node_group
      rule: 'NodeGroups have a hard ordering constraint: the cluster must be ACTIVE before nodegroup create succeeds. Always set `depends_on = [aws_eks_cluster.NAME]` even when the implicit reference (`cluster_name = aws_eks_cluster.NAME.name`) would seem sufficient — the AWS provider sometimes parallelises and triggers "ResourceInUseException: cluster is creating". Subnet ids must be a SUBSET of the parent cluster''s `vpc_config.subnet_ids` (cross-cluster subnet reuse fails with "InvalidParameterException: subnet does not belong to cluster VPC").'
      source: seed
    - resource: aws_sqs_queue
      rule: 'FIFO queues MUST end in `.fifo` suffix and have `fifo_queue = true`. Mismatch fails with "InvalidParameterValue: FIFO queue names must end in .fifo". Standard queues must NOT have the .fifo suffix. RedrivePolicy is a JSON-encoded string (NOT a HCL block) referencing the DLQ ARN: `redrive_policy = jsonencode({ deadLetterTargetArn = aws_sqs_queue.dlq.arn, maxReceiveCount = 5 })`. Inline objects fail with "InvalidParameterValue: invalid redrive policy".'
      source: seed
    - resource: aws_sqs_queue_policy
      rule: '`aws_sqs_queue_policy` is a SEPARATE resource from `aws_sqs_queue` — attempting to set queue policy via inline argument on the queue (`policy = ...`) is silently ignored on most provider versions. Use the dedicated resource: `resource "aws_sqs_queue_policy" "p" { queue_url = aws_sqs_queue.NAME.url; policy = ... }`. Without the policy resource, the queue is created with the default empty policy.'
      source: seed

    # ----- S47-T0 — Route53 + Secrets Manager phase pitfalls. -----

    - resource: aws_route53_zone
      rule: 'Hosted-zone delete is REJECTED if the zone still has records other than the default NS / SOA. The error code is "HostedZoneNotEmpty". Always either (a) delete every aws_route53_record before the zone, or (b) set `force_destroy = true` on the zone resource (provider-side flag — fakeaws does not honour it; explicit record cleanup is the only reliable path).'
      source: seed
    - resource: aws_route53_record
      rule: 'CNAME records cannot coexist with the apex (zone-root) of a hosted zone — for the apex, use an `alias` block pointing at an AWS resource (CloudFront, ALB, S3 website endpoint). For child records (`www.example.com`), CNAMEs are fine. ChangeResourceRecordSets is TRANSACTIONAL: if any change in the batch fails validation, the whole batch rejects with no partial state. fakeaws emulates this — the record-set update is all-or-nothing.'
      source: seed
    - resource: aws_secretsmanager_secret
      rule: 'For test/destroy cycles, set `recovery_window_in_days = 0` so DeleteSecret is immediate (no soft-delete window). Default is 30 days — re-applying a scenario that creates a secret with the same name within 30 days fails with "InvalidRequestException: secret scheduled for deletion". RestoreSecret reverses scheduled deletion ONLY within the window; once the window elapses (or recovery_window_in_days=0), the secret is permanently destroyed and RestoreSecret returns 409.'
      source: seed
    - resource: aws_secretsmanager_secret_version
      rule: 'Each `aws_secretsmanager_secret_version` produces a distinct VersionId. PutSecretValue is the AWS-side API; the Go SDK does NOT increment automatically — each call mints a new version. Stage labels (AWSCURRENT, AWSPREVIOUS) move to the new version on each Put. Reading via GetSecretValue without a VersionStage defaults to AWSCURRENT.'
      source: seed
