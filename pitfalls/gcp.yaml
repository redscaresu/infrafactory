provider: gcp
pitfalls:
    - resource: google_compute_instance
      rule: Always declare a `google_compute_network` AND at least one `google_compute_subnetwork` in the scenario's region. Then on `google_compute_instance` set `network_interface { subnetwork = google_compute_subnetwork.NAME.id }`. On `google_container_cluster` set BOTH `network = google_compute_network.NAME.id` AND `subnetwork = google_compute_subnetwork.NAME.id`. Do NOT use the `default` VPC — it is often disabled by org policy.
      source: learned
      discovered_from: gcp-full-stack
    - resource: google_container_cluster
      rule: Always declare a `google_compute_network` AND at least one `google_compute_subnetwork` in the scenario's region. Then on `google_compute_instance` set `network_interface { subnetwork = google_compute_subnetwork.NAME.id }`. On `google_container_cluster` set BOTH `network = google_compute_network.NAME.id` AND `subnetwork = google_compute_subnetwork.NAME.id`. Do NOT use the `default` VPC — it is often disabled by org policy.
      source: learned
      discovered_from: gcp-full-stack
    - resource: google_service_account
      rule: '`google_service_account` is escaping to the REAL cloud API (401 OAuth/auth error). The provider block in `providers.tf` is missing a `*_custom_endpoint` override for this resource''s service. Either add the matching custom_endpoint OR remove `google_service_account` from this scenario (the mock doesn''t intercept it).'
      source: learned
      discovered_from: gcp-full-stack
    - resource: google_project_service
      rule: '`google_project_service` is escaping to the REAL cloud API (401 OAuth/auth error). The provider block in `providers.tf` is missing a `*_custom_endpoint` override for this resource''s service. Either add the matching custom_endpoint OR remove `google_project_service` from this scenario (the mock doesn''t intercept it).'
      source: learned
      discovered_from: gcp-vm-network
    - resource: google_storage_bucket
      rule: google_storage_bucket.app_assets has no encryption.default_kms_key_name — customer-managed encryption not configured
      source: learned
      discovered_from: gcp-storage
