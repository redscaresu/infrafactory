provider: gcp
pitfalls:
    - resource: google_project_service
      rule: |-
        exit status 1 | stderr: ╷
        │ Error: Error when reading or editing Project Service infrafactory-test/redis.googleapis.com: googleapi: Error 401: Request had invalid authentication credentials. Expected OAuth 2 access token, login cookie or other valid authentication credential. See https://deve...
      source: learned
      discovered_from: gcp-memorystore
    - resource: google_compute_instance
      rule: google_compute_instance.api_server has no network_interface.subnetwork — must be attached to an explicit VPC subnetwork
      source: learned
      discovered_from: gcp-full-stack
    - resource: google_compute_instance_template
      rule: "exit status 1 | stderr: ╷\n│ Error: Error creating instance template: googleapi: Error 501: Not implemented: POST /compute/v1/projects/infrafactory-test/global/instanceTemplates, notImplemented\n│ \n│   with google_compute_instance_template.backend,\n│   on instance_template.tf line 1, in r..."
      source: learned
      discovered_from: gcp-load-balancer
    - resource: google_storage_bucket
      rule: google_storage_bucket.app_assets has no encryption.default_kms_key_name — customer-managed encryption not configured
      source: learned
      discovered_from: gcp-storage
