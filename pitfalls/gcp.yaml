provider: gcp
pitfalls:
    - resource: google_compute_instance
      rule: Always declare a `google_compute_network` AND at least one `google_compute_subnetwork` in the scenario's region. Then on `google_compute_instance` set `network_interface { subnetwork = google_compute_subnetwork.NAME.id }`. On `google_container_cluster` set BOTH `network = google_compute_network.NAME.id` AND `subnetwork = google_compute_subnetwork.NAME.id`. Do NOT use the `default` VPC â€” it is often disabled by org policy.
      source: learned
      discovered_from: gcp-full-stack
    - resource: google_container_cluster
      rule: Always declare a `google_compute_network` AND at least one `google_compute_subnetwork` in the scenario's region. Then on `google_compute_instance` set `network_interface { subnetwork = google_compute_subnetwork.NAME.id }`. On `google_container_cluster` set BOTH `network = google_compute_network.NAME.id` AND `subnetwork = google_compute_subnetwork.NAME.id`. Do NOT use the `default` VPC â€” it is often disabled by org policy.
      source: learned
      discovered_from: gcp-full-stack
    - resource: google_redis_instance
      rule: '`google_redis_instance` does NOT accept the argument `deletion_protection` â€” the provider rejects it with "An argument named "deletion_protection" is not expected here." Remove the `deletion_protection = ...` line from every `google_redis_instance` block; do NOT reintroduce it across iterations. Check the provider docs for the canonical argument set (common traps: deprecated/renamed args, v1â†’v2 service rewrites where the old arg moved or disappeared).'
      source: learned
      discovered_from: gcp-full-stack
    - resource: google_service_networking_connection
      rule: |
        Do NOT use `google_service_networking_connection` to enable private Cloud SQL. The terraform-provider-google v5 servicenetworking package's Read flow does an internal `retrieveProject` call that escapes to real `cloudresourcemanager.googleapis.com` â€” it does NOT honor `cloud_resource_manager_custom_endpoint` (same architectural shape as the IAM batching escape, but with no equivalent provider knob). The failure surfaces as `Failed to find Service Networking Connection ... err: Failed to retrieve project ... ACCESS_TOKEN_TYPE_UNSUPPORTED` on iteration 2+ and stalls the run.

        Instead set `ip_configuration { private_network = google_compute_network.NAME.id }` directly on `google_sql_database_instance`. fakegcp accepts this shape â€” it routes through normal endpoint overrides and doesn't enforce the SNC prerequisite that real GCP would.

        Working shape (drop the `google_compute_global_address` + SNC + private_vpc_connection chain entirely):

            resource "google_sql_database_instance" "postgres" {
              name             = "..."
              database_version = "POSTGRES_15"
              region           = var.region
              settings {
                tier = "db-f1-micro"
                ip_configuration {
                  ipv4_enabled    = false
                  private_network = google_compute_network.main.id
                }
              }
              # No depends_on referencing service_networking_connection.
            }

        Applies to: gcp-cloud-sql, gcp-full-stack, any GCP scenario with `private_network: true` on a database.
      source: learned
      discovered_from: gcp-full-stack
