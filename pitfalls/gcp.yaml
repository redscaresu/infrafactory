provider: gcp
pitfalls:
    - resource: google_compute_instance
      rule: Always declare a `google_compute_network` AND at least one `google_compute_subnetwork` in the scenario's region. Then on `google_compute_instance` set `network_interface { subnetwork = google_compute_subnetwork.NAME.id }`. On `google_container_cluster` set BOTH `network = google_compute_network.NAME.id` AND `subnetwork = google_compute_subnetwork.NAME.id`. Do NOT use the `default` VPC â€” it is often disabled by org policy.
      source: learned
      discovered_from: gcp-full-stack
    - resource: google_container_cluster
      rule: Always declare a `google_compute_network` AND at least one `google_compute_subnetwork` in the scenario's region. Then on `google_compute_instance` set `network_interface { subnetwork = google_compute_subnetwork.NAME.id }`. On `google_container_cluster` set BOTH `network = google_compute_network.NAME.id` AND `subnetwork = google_compute_subnetwork.NAME.id`. Do NOT use the `default` VPC â€” it is often disabled by org policy.
      source: learned
      discovered_from: gcp-full-stack
    - resource: google_storage_bucket
      rule: google_storage_bucket.app_assets has no encryption.default_kms_key_name â€” customer-managed encryption not configured
      source: learned
      discovered_from: gcp-storage
    - resource: google_cloud_run_v2_service
      rule: "exit status 1 | stderr: â•·\nâ”‚ Error: Unsupported argument\nâ”‚ \nâ”‚   on main.tf line 6, in resource \"google_cloud_run_v2_service\" \"api\":\nâ”‚    6:   deletion_protection = false\nâ”‚ \nâ”‚ An argument named \"deletion_protection\" is not expected here.\nâ•µ"
      source: learned
      discovered_from: gcp-cloud-run
