provider: scaleway
pitfalls:
- resource: scaleway_domain_record
  rule: 'Do NOT create DNS records unless the scenario explicitly lists DNS/domain resources. The `dns_resolution` acceptance criterion is auto-evaluated and does NOT require a `scaleway_domain_record` resource in the generated HCL. Creating records for a non-existent zone will cause `tofu apply` to fail with "resource not found".

    '
  source: learned
- resource: scaleway_redis_cluster
  rule: 'The `password` must meet Scaleway''s complexity requirements: 8-128 characters, at least one digit, one uppercase, one lowercase, and one special character. Use a compliant default like `default = "Ch4ng3Me!@2024"`.

    '
  source: learned
